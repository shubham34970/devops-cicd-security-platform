name: Development Pipeline

on:
  push:
    branches:
      - development

jobs:
  build-test-security:
    name: Build, Test, and Security Validation
    runs-on: ubuntu-latest
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Build)
        run: npm install

      - name: Run Automated Tests
        run: npm test

      - name: Security Validation (npm audit)
        run: npm audit --audit-level=high || echo "Vulnerabilities found, but ignoring for demo purposes."

      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts
          cp -r package.json package-lock.json app.js utils.js artifacts/
          echo "Build completed on $(date)" > artifacts/build_info.txt

      - name: Store Deployment Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-artifacts
          path: artifacts/

  deploy-to-staging:
    name: Deployment
    needs: build-test-security
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-artifacts
          path: artifacts/

      - name: Deploy to Staging Environment
        env:
          DEV_API_KEY: ${{ secrets.DEV_API_KEY }}
          DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
        run: |
          echo "Starting deployment to staging..."
          # Simulated deployment steps using secure environment variables
          echo "Using DEV_API_KEY (masked): ${DEV_API_KEY}"
          echo "Using DEV_DB_PASSWORD (masked): ${DEV_DB_PASSWORD}"
          echo "Deploying artifact contents:"
          ls -la artifacts/
          echo "Deployment successful!"
          
          # Generate Deployment Report
          echo "### Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **Staging**" >> $GITHUB_STEP_SUMMARY
          echo "Status: **Success** :white_check_mark:" >> $GITHUB_STEP_SUMMARY

  rollback-on-failure:
    name: Rollback Mechanism
    needs: deploy-to-staging
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Execute Rollback
        run: |
          echo "Deployment failed! Initiating rollback procedures..."
          # Simulated rollback script
          echo "Reverting to previous stable state in Staging environment."
          
          echo "### Rollback Report" >> $GITHUB_STEP_SUMMARY
          echo "Rollback initiated due to deployment failure. Status: **Completed** :warning:" >> $GITHUB_STEP_SUMMARY
