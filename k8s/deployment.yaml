apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: secure-namespace
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: demo-container
          image: myregistry.com/demo-app:v1.0.0
          ports:
            - containerPort: 3000
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
